services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "8787:8787"
    env_file:
      - .env.docker
    environment:
      HOST: 0.0.0.0
      PORT: 8787
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  api_node_modules:
  web_node_modules:
