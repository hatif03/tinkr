<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tinkr review</title><style>body{margin:0;background:#101116;color:#f5f5f7;font:14px Inter,system-ui,sans-serif}.shell{max-width:1100px;margin:0 auto;padding:32px}.card{background:#191a20;border:1px solid #30313a;border-radius:16px;padding:20px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}h1{margin:5px 0;font-size:28px}p{color:#a7a9b3}.preview{width:100%;min-height:380px;object-fit:contain;background:#08090c;border-radius:10px;margin-top:20px}.patch{padding:10px;border-bottom:1px solid #30313a;font:12px ui-monospace,monospace}.badge{color:#101116;background:#b8ff37;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:800}button{background:#b8ff37;color:#101116;border:0;border-radius:8px;padding:10px 12px;font-weight:800;cursor:pointer}</style></head><body><main class="shell"><div id="app" class="card">Loading shared remix…</div></main><script>const token=location.pathname.split('/').pop();fetch('/api/review/'+encodeURIComponent(token)).then(async r=>{const d=await r.json();if(!r.ok)throw Error(d.error);return d}).then(({revision})=>{const p=revision.projects;const ops=revision.patch_snapshot||[];document.querySelector('#app').innerHTML=`<div class="top"><div><span class="badge">TINKR REVIEW</span><h1>${escape(p.name)}</h1><p>${escape(revision.name||'Saved revision')} · ${ops.length} local changes</p></div><button id="open">Open in Tinkr</button></div>${p.preview_path?`<img class="preview" src="${escape(p.preview_path)}" alt="Project preview">`:'<div class="preview">No capture was saved for this revision.</div>'}<h3>Change summary</h3><div>${ops.map(o=>`<div class="patch">${escape(o.operation||o.type||'patch')} · ${escape(o.target?.selector||o.selector||'unanchored')}</div>`).join('')||'<p>No recorded patches.</p>'}</div>`;document.querySelector('#open').onclick=()=>navigator.clipboard.writeText(location.href).then(()=>alert('Share link copied. In Tinkr, choose Import shared revision.'));}).catch(e=>document.querySelector('#app').textContent=e.message);function escape(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}</script></body></html>
