name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: server
      - run: npm test
        working-directory: server

  canvas-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --test packages/canvas/patch-applicator.test.js

# Vercel Git integration deploys web/ and server/ as separate projects when linked.
